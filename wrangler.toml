# Cloudflare Workers configuration for Analytics Dashboard
name = "cfanalytics"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Worker configuration
[env.production]
name = "cloudflare-analytics-dashboard"

[env.staging]
name = "cloudflare-analytics-dashboard-staging"

# Build configuration
[build]
command = ""

